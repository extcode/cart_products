name: CI
on:
  - pull_request
jobs:
  check-composer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate composer.json
        run: composer validate

  php-linting:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php-version }}"
          tools: composer:v2

      - name: PHP lint
        run: "find *.php Classes Configuration Tests -name '*.php' -print0 | xargs -0 -n 1 -P 4 php -l"

  documentation-rendering:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Documentation without warnings
        run: |
          mkdir -p Documentation-GENERATED-temp \
          && docker run --rm --pull always -v $(pwd):/project \
             ghcr.io/typo3-documentation/render-guides:latest --config=Documentation --no-progress --fail-on-log

  coding-guideline:
    runs-on: ubuntu-latest
    needs:
      - php-linting
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Coding Guideline
        run: composer project:cgl

  code-quality:
    runs-on: ubuntu-latest
    needs:
      - php-linting
    strategy:
      matrix:
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php-version }}"
          tools: composer:v2

      - name: Install dependencies with expected TYPO3 version
        run: |-
          composer remove --dev ssch/typo3-rector \
          && composer require typo3/cms-install "*" \
          && composer install --no-progress --no-ansi --no-interaction

      - name: Build codeception tester
        run: .build/bin/codecept build

      - name: Code Quality (by PHPStan)
        run: composer project:phpstan

  tests-unit-and-functional:
    runs-on: ubuntu-latest
    needs:
      - coding-guideline
      - code-quality
    strategy:
      matrix:
        php-version:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php-version }}"
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Run unit tests
        run: composer project:test:unit

      - name: Run functional tests
        run: export typo3DatabaseDriver=pdo_sqlite && composer project:test:functional

  test-acceptance:
    runs-on: ubuntu-latest
    needs:
      - tests-unit-and-functional
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run Acceptance Tests PHP8.2
        run: nix-shell --arg phpVersion \"php82\" --pure --run project-test-acceptance

      - name: Run Acceptance Tests PHP8.3
        run: nix-shell --arg phpVersion \"php83\" --pure --run project-test-acceptance

      - name: Run Acceptance Tests PHP8.4
        run: nix-shell --arg phpVersion \"php84\" --pure --run project-test-acceptance

      - name: Run Acceptance Tests PHP8.5
        run: nix-shell --arg phpVersion \"php85\" --pure --run project-test-acceptance
